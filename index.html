<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班费报销公开</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
        }

        .summary-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-5px);
        }

        .summary-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .summary-card .amount {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .summary-card.income .amount {
            color: #10b981;
        }

        .summary-card.expense .amount {
            color: #ef4444;
        }

        .controls {
            padding: 20px 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            background: white;
            border-bottom: 2px solid #f0f0f0;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .table-container {
            padding: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #667eea;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        .type-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .type-income {
            background: #d1fae5;
            color: #065f46;
        }

        .type-expense {
            background: #fee2e2;
            color: #991b1b;
        }

        .amount-positive {
            color: #10b981;
            font-weight: 600;
        }

        .amount-negative {
            color: #ef4444;
            font-weight: 600;
        }

        footer {
            padding: 20px 30px;
            text-align: center;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
        }

        .edit-notice {
            margin-top: 10px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            color: #856404;
        }

        .edit-notice a {
            color: #667eea;
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #666;
            font-size: 1.2em;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .summary {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>班费报销公开</h1>
            <p>透明、公开、可查询</p>
        </header>

        <div class="summary">
            <div class="summary-card income">
                <h3>总收入</h3>
                <div class="amount" id="totalIncome">¥0.00</div>
            </div>
            <div class="summary-card expense">
                <h3>总支出</h3>
                <div class="amount" id="totalExpense">¥0.00</div>
            </div>
            <div class="summary-card">
                <h3>当前余额</h3>
                <div class="amount" id="balance">¥0.00</div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索事由、经手人...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="income">收入</button>
                <button class="filter-btn" data-filter="expense">支出</button>
            </div>
        </div>

        <div class="table-container">
            <div id="loading" class="loading">加载中...</div>
            <table id="recordTable" style="display:none;">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>类型</th>
                        <th>事由</th>
                        <th>金额</th>
                        <th>经手人</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="recordBody">
                </tbody>
            </table>
            <div id="noResults" class="no-results" style="display: none;">
                暂无符合条件的记录
            </div>
        </div>

        <footer>
            <p>更新时间: <span id="updateTime"></span></p>
            <p>如有疑问，请联系班委</p>
            <div class="edit-notice">
                <strong>💡 班委如何更新数据？</strong><br>
                在 GitHub 仓库中直接编辑 <code>data.json</code> 文件即可，所有访问者会自动看到最新数据。<br>
                <a href="https://github.com/你的用户名/仓库名/edit/main/data.json" target="_blank">点击这里编辑数据 →</a>
            </div>
        </footer>
    </div>

    <script>
        let records = [];

        // 从 GitHub 加载数据
        async function loadData() {
            try {
                // 如果是本地测试，使用相对路径
                // 如果已部署到 GitHub Pages，这个路径会自动指向正确的位置
                const response = await fetch('data.json');

                if (!response.ok) {
                    throw new Error('数据加载失败');
                }

                records = await response.json();

                // 按日期排序（最新的在前面）
                records.sort((a, b) => new Date(b.date) - new Date(a.date));

                document.getElementById('loading').style.display = 'none';
                document.getElementById('recordTable').style.display = 'table';

                calculateSummary();
                applyFilters();
                setUpdateTime();
            } catch (error) {
                document.getElementById('loading').innerHTML =
                    '<p style="color: #ef4444;">❌ 数据加载失败</p>' +
                    '<p style="font-size: 0.9em; margin-top: 10px;">请确保 data.json 文件存在并格式正确</p>';
                console.error('加载数据出错:', error);
            }
        }

        // 计算统计数据
        function calculateSummary() {
            const income = records
                .filter(r => r.type === 'income')
                .reduce((sum, r) => sum + r.amount, 0);

            const expense = records
                .filter(r => r.type === 'expense')
                .reduce((sum, r) => sum + r.amount, 0);

            const balance = income - expense;

            document.getElementById('totalIncome').textContent = `¥${income.toFixed(2)}`;
            document.getElementById('totalExpense').textContent = `¥${expense.toFixed(2)}`;
            document.getElementById('balance').textContent = `¥${balance.toFixed(2)}`;
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('recordBody');
            const noResults = document.getElementById('noResults');

            if (data.length === 0) {
                tbody.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';
            tbody.innerHTML = data.map(record => {
                const displayAmount = record.type === 'income' ? record.amount : -record.amount;

                return `
                    <tr>
                        <td>${record.date}</td>
                        <td>
                            <span class="type-badge type-${record.type}">
                                ${record.type === 'income' ? '收入' : '支出'}
                            </span>
                        </td>
                        <td>${record.reason}</td>
                        <td class="${displayAmount >= 0 ? 'amount-positive' : 'amount-negative'}">
                            ${displayAmount >= 0 ? '+' : ''}¥${Math.abs(displayAmount).toFixed(2)}
                        </td>
                        <td>${record.handler}</td>
                        <td>${record.note}</td>
                    </tr>
                `;
            }).join('');
        }

        // 应用筛选
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

            let filtered = records;

            if (activeFilter !== 'all') {
                filtered = filtered.filter(r => r.type === activeFilter);
            }

            if (searchTerm) {
                filtered = filtered.filter(r =>
                    r.reason.toLowerCase().includes(searchTerm) ||
                    r.handler.toLowerCase().includes(searchTerm) ||
                    r.note.toLowerCase().includes(searchTerm)
                );
            }

            renderTable(filtered);
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // 筛选功能
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                applyFilters();
            });
        });

        // 设置更新时间
        function setUpdateTime() {
            const now = new Date();
            const dateStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('updateTime').textContent = dateStr;
        }

        // 初始化 - 从 GitHub 加载数据
        loadData();
    </script>
</body>
</html>
